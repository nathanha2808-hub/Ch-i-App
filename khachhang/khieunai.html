                    "on-primary": "#ffffff", "on-primary-container": "#642600",
                    "primary-fixed": "#ffdbcc", "primary-fixed-dim": "#ffb693",
                    "surface": "#fff8f6", "surface-dim": "#ecd6cc",
                    "surface-container": "#ffeae1", "surface-container-low": "#fff1eb",
                    "surface-container-lowest": "#ffffff", "surface-container-high": "#fae4da",
                    "on-surface": "#241914", "on-surface-variant": "#584238",

                },
                "spacing": { "md": "16px", "lg": "24px", "container-padding": "20px", "xs": "8px", "sm": "12px", "xl": "32px" },

                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],

</script>
<style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #fff8f6; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .orange-gradient { background: linear-gradient(135deg, #ff7e36 0%, #a04100 100%); }
    .soft-shadow { box-shadow: 0 4px 12px rgba(255, 126, 54, 0.08); }
    /* TC-KH23-006: Fix text tràn */
    #ticket-history p, #ticket-history h4 { word-break: break-word; overflow-wrap: break-word; }
    /* TC-KH23-011: Smooth scrolling */
    #ticket-history { scroll-behavior: smooth; }
</style>
</head>
<body class="bg-surface-dim text-on-surface min-h-screen flex flex-col items-center">
    <div class="w-full max-w-[430px] min-h-screen bg-background relative shadow-2xl">
        <div class="absolute top-0 left-0 w-full h-[200px] z-0 pointer-events-none" style="background: linear-gradient(rgb(255, 126, 54) 0%, rgb(252, 249, 248) 100%);"></div>

<!-- Header -->
<header class="relative  left-1/2 -translate-x-1/2 w-full max-w-[430px] z-40 pt-12 px-container-padding">
    <div class="flex items-center gap-3">
        <a href="taikhoan.html" class="text-white active:scale-90 transition-all">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-headline-md font-headline-md text-white flex-1">Khiếu nại</h1>
    </div>
</header>

<!-- Main Content -->
<main class="relative z-10 pt-28 pb-8 px-container-padding space-y-4">

    <!-- Ticket Form -->
    <section class="bg-white rounded-2xl p-5 soft-shadow border border-surface-container space-y-4">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 rounded-full orange-gradient flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-[24px]">report_problem</span>
            </div>
            <div>
                <h2 class="text-title-sm font-bold text-on-surface">Gửi khiếu nại</h2>
                <p class="text-body-sm text-on-surface-variant">Phản hồi sẽ được Admin xử lý qua Inbox</p>
            </div>
        </div>

        <!-- Subject -->
        <div>
            <label class="text-label-sm text-on-surface-variant block mb-1 ml-1">Chủ đề (*)</label>
            <select id="ticket-subject" class="w-full p-3.5 rounded-xl border border-outline-variant bg-surface-container-low text-body-lg focus:ring-2 focus:ring-primary-container">
                <option value="">— Chọn chủ đề —</option>
                <option value="Khiếu nại đơn hàng">Khiếu nại đơn hàng</option>
                <option value="Phản hồi Tasker">Phản hồi Tasker</option>
                <option value="Vấn đề thanh toán">Vấn đề thanh toán</option>
                <option value="Vấn đề tài khoản">Vấn đề tài khoản</option>
                <option value="Góp ý dịch vụ">Góp ý dịch vụ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>

        <!-- Lỗi 2 FIX: Chọn đơn hàng liên quan -->
        <div id="order-select-wrap" class="hidden">
            <label class="text-label-sm text-on-surface-variant block mb-1 ml-1">Đơn hàng liên quan</label>
            <select id="ticket-order" class="w-full p-3.5 rounded-xl border border-outline-variant bg-surface-container-low text-body-lg focus:ring-2 focus:ring-primary-container">
                <option value="">— Chọn đơn hàng —</option>
            </select>
            <p class="text-[11px] text-on-surface-variant mt-1 ml-1">Chọn đơn hàng cụ thể để Admin xử lý nhanh hơn</p>
        </div>

        <!-- Description -->
        <div>
            <label class="text-label-sm text-on-surface-variant block mb-1 ml-1">Mô tả chi tiết (*)</label>
            <textarea id="ticket-desc" rows="5" class="w-full p-3.5 rounded-xl border border-outline-variant bg-surface-container-low text-body-sm focus:ring-2 focus:ring-primary-container resize-none" placeholder="Mô tả vấn đề bạn gặp phải (tối thiểu 20 ký tự)..."></textarea>
            <p id="char-count" class="text-[11px] text-on-surface-variant text-right mt-1">0/500</p>
        </div>

        <!-- Error -->
        <p id="errorMsg" class="text-error text-body-sm px-1" style="display:none;"></p>

        <!-- Submit -->
        <button id="submitBtn" onclick="submitTicket()" class="orange-gradient w-full py-4 rounded-2xl shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-white text-[20px]">send</span>
            <span class="text-white text-[15px] font-bold">Gửi khiếu nại</span>
        </button>
    </section>

    <!-- Ticket History -->
    <section class="bg-white rounded-2xl p-5 soft-shadow border border-surface-container">
        <h3 class="text-title-sm font-bold text-on-surface mb-3">Lịch sử khiếu nại</h3>
        <div id="ticket-history" class="space-y-3">
            <div class="text-center py-6 text-on-surface-variant">
                <span class="material-symbols-outlined text-[40px] opacity-20 block mb-2">inbox</span>
                <p class="text-body-sm">Đang tải...</p>
            </div>
        </div>
    </section>

</main>
    </div>

    <script src="../shared/api.js?v=20260514"></script>
<script src="../shared/prefetch.js" defer></script>
    <script>
    (async function() {
        if (!ChiOiAuth.requireAuth('dangnhap.html')) return;

        // Char counter
        var desc = document.getElementById('ticket-desc');
        var counter = document.getElementById('char-count');
        desc.addEventListener('input', function() {
            counter.textContent = desc.value.length + '/500';
        });
        desc.maxLength = 500;

        // Load ticket history
        try {
            var tickets = await apiFetch('/api/support/tickets');
            var historyEl = document.getElementById('ticket-history');
            if (Array.isArray(tickets) && tickets.length > 0) {
                historyEl.innerHTML = '';
                tickets.forEach(function(t) {
                    var statusColors = {
                        'OPEN': 'bg-blue-100 text-blue-700',
                        'IN_PROGRESS': 'bg-orange-100 text-orange-700',
                        'RESOLVED': 'bg-green-100 text-green-700',
                        'CLOSED': 'bg-gray-100 text-gray-500'
                    };
                    var statusLabels = {
                        'OPEN': 'Mới',
                        'IN_PROGRESS': 'Đang xử lý',
                        'RESOLVED': 'Đã giải quyết',
                        'CLOSED': 'Đã đóng'
                    };
                    var cls = statusColors[t.status] || 'bg-gray-100 text-gray-500';
                    var label = statusLabels[t.status] || t.status;
                    var item = document.createElement('div');
                    item.className = 'p-3 bg-surface-container-low rounded-xl border border-outline-variant/30 cursor-pointer hover:border-primary/40 transition-all active:scale-[0.98]';
                    item.innerHTML =
                        '<div class="flex justify-between items-start mb-1">' +
                            '<h4 class="text-body-lg font-bold text-on-surface flex-1">' + (t.subject || 'Khiếu nại') + '</h4>' +
                            '<span class="text-[10px] font-bold px-2 py-0.5 rounded-full ' + cls + '">' + label + '</span>' +
                        '</div>' +
                        '<p class="text-body-sm text-on-surface-variant line-clamp-2 mb-1">' + (t.description || '') + '</p>' +
                        '<div class="flex justify-between items-center">' +
                          '<p class="text-[11px] text-outline">' + formatDateTime(t.created_at) + '</p>' +
                          '<span class="text-[11px] text-primary font-bold flex items-center gap-0.5"><span class="material-symbols-outlined text-[14px]">chat</span>Xem chat</span>' +
                        '</div>';
                    item.addEventListener('click', function() { openTicketChat(t); });
                    historyEl.appendChild(item);
                });
            } else {
                historyEl.innerHTML = '<div class="text-center py-6 text-on-surface-variant"><span class="material-symbols-outlined text-[40px] opacity-20 block mb-2">inbox</span><p class="text-body-sm">Chưa có khiếu nại nào</p></div>';
            }
        } catch (e) {
            console.warn('Cannot load tickets:', e);
            document.getElementById('ticket-history').innerHTML = '<p class="text-body-sm text-on-surface-variant text-center py-4">Chưa có khiếu nại nào</p>';
        }
        // Lỗi 2 FIX: Load đơn hàng của KH để chọn khi khiếu nại
        try {
            var myOrders = await apiFetch('/api/orders/customer/history');
            var orderSelect = document.getElementById('ticket-order');
            if (Array.isArray(myOrders)) {
                myOrders.filter(function(o) { return o.status === 'COMPLETED' || o.status === 'CANCELLED'; }).forEach(function(o) {
                    var opt = document.createElement('option');
                    opt.value = o.order_id;
                    opt.textContent = '#' + o.order_code + ' - ' + (o.service_name || 'Dịch vụ') + ' - ' + new Date(o.scheduled_time).toLocaleDateString('vi-VN');
                    orderSelect.appendChild(opt);
                });
            }
        } catch(e) { console.warn('Cannot load orders:', e); }

        // Lỗi 2 FIX: Hiện/ẩn dropdown đơn hàng theo chủ đề
        document.getElementById('ticket-subject').addEventListener('change', function() {
            var wrap = document.getElementById('order-select-wrap');
            if (this.value === 'Khiếu nại đơn hàng' || this.value === 'Phản hồi Tasker' || this.value === 'Vấn đề thanh toán') {
                wrap.classList.remove('hidden');
            } else {
                wrap.classList.add('hidden');
                document.getElementById('ticket-order').value = '';
            }
        });
    })();

    async function submitTicket() {
        var subject = document.getElementById('ticket-subject').value;
        var desc = document.getElementById('ticket-desc').value.trim();
        var orderId = document.getElementById('ticket-order').value;
        var errorEl = document.getElementById('errorMsg');
        var btn = document.getElementById('submitBtn');

        if (!subject) {
            errorEl.textContent = 'Vui lòng chọn chủ đề.';
            errorEl.style.display = 'block';
            return;
        }
        if (desc.length < 20) {
            errorEl.textContent = 'Mô tả phải ít nhất 20 ký tự.';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="text-white text-[15px] font-bold">Đang gửi...</span>';
        errorEl.style.display = 'none';

        // Lỗi 2 FIX: Gửi order_id kèm ticket
        var payload = { subject: subject, description: desc };
        if (orderId) payload.order_id = parseInt(orderId);

        try {
            await apiFetch('/api/support/tickets', {
                method: 'POST',
                body: payload
            });
            showToastMsg('✅ Khiếu nại đã được gửi. Admin sẽ phản hồi qua Inbox.');
            document.getElementById('ticket-subject').value = '';
            document.getElementById('ticket-desc').value = '';
            document.getElementById('char-count').textContent = '0/500';
            // Reload ticket history
            setTimeout(function() { window.location.reload(); }, 1500);
        } catch (err) {
            errorEl.textContent = err.message || 'Gửi thất bại. Vui lòng thử lại.';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<span class="material-symbols-outlined text-white text-[20px]">send</span><span class="text-white text-[15px] font-bold">Gửi khiếu nại</span>';
        }
    }
    // Lỗi 4 FIX: Chat modal trong khiếu nại
    function openTicketChat(ticket) {
      var existing = document.getElementById('ticket-chat-modal');
      if (existing) existing.remove();

      var overlay = document.createElement('div');
      overlay.id = 'ticket-chat-modal';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;';
      overlay.innerHTML =
        '<div style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;height:85vh;display:flex;flex-direction:column;animation:scaleIn 0.2s ease-out">' +
          '<div style="padding:16px 20px;border-bottom:1px solid #dfc0b3;display:flex;align-items:center;gap:12px;flex-shrink:0">' +
            '<button id="chat-close" style="width:36px;height:36px;border-radius:50%;background:#f4ded5;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer"><span class="material-symbols-outlined" style="font-size:20px;color:#584238">close</span></button>' +
            '<div style="flex:1;min-width:0">' +
              '<h3 style="font-size:15px;font-weight:700;color:#241914;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (ticket.subject || 'Khiếu nại') + '</h3>' +
              '<p style="font-size:11px;color:#8b7266">' + (ticket.ticket_code || '#TK-' + ticket.ticket_id) + ' · ' + (ticket.status || '') + '</p>' +
            '</div>' +
          '</div>' +
          '<div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;background:#fff8f6">' +
            '<div style="text-align:center;padding:20px;color:#8b7266;font-size:13px"><span class="material-symbols-outlined" style="font-size:32px;opacity:0.3;display:block;margin-bottom:8px">chat_bubble</span>Đang tải tin nhắn...</div>' +
          '</div>' +
          '<div style="padding:12px 16px;border-top:1px solid #dfc0b3;display:flex;gap:8px;flex-shrink:0;background:#fff">' +
            '<input id="chat-input" type="text" placeholder="Nhập tin nhắn..." style="flex:1;padding:10px 16px;border:1px solid #dfc0b3;border-radius:24px;font-size:14px;font-family:Be Vietnam Pro,sans-serif;outline:none" />' +
            '<button id="chat-send" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff7e36,#a04100);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><span class="material-symbols-outlined" style="font-size:20px;color:#fff">send</span></button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);

      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      document.getElementById('chat-close').addEventListener('click', function() { overlay.remove(); });

      // Load messages
      loadTicketMessages(ticket.ticket_id);

      // Send message
      document.getElementById('chat-send').addEventListener('click', function() { sendChatMsg(ticket.ticket_id); });
      document.getElementById('chat-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendChatMsg(ticket.ticket_id);
      });
    }

    async function loadTicketMessages(ticketId) {
      var container = document.getElementById('chat-messages');
      try {
        var msgs = await apiFetch('/api/support/tickets/' + ticketId + '/messages');
        if (!msgs || msgs.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:30px;color:#8b7266;font-size:13px">' +
            '<span class="material-symbols-outlined" style="font-size:40px;opacity:0.2;display:block;margin-bottom:8px">chat_bubble</span>' +
            '<p>Chưa có tin nhắn nào</p><p style="font-size:11px;margin-top:4px">Gửi tin nhắn để bắt đầu trao đổi với Admin</p></div>';
          return;
        }
        var userId = parseInt(localStorage.getItem('chioi_user_id') || '0');
        container.innerHTML = msgs.map(function(m) {
          var isMine = m.sender_id === userId;
          var time = new Date(m.created_at).toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
          var date = new Date(m.created_at).toLocaleDateString('vi-VN');
          if (isMine) {
            return '<div style="align-self:flex-end;max-width:80%">' +
              '<div style="background:linear-gradient(135deg,#ff7e36,#a04100);color:#fff;padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:13px">' + m.content + '</div>' +
              '<p style="font-size:10px;color:#8b7266;text-align:right;margin-top:2px">' + time + ' · ' + date + '</p></div>';
          } else {
            return '<div style="align-self:flex-start;max-width:80%">' +
              '<p style="font-size:10px;font-weight:700;color:#a04100;margin-bottom:2px">' + (m.is_admin ? '🛡️ Admin' : (m.full_name || 'Người dùng')) + '</p>' +
              '<div style="background:#f4ded5;color:#241914;padding:10px 14px;border-radius:16px 16px 16px 4px;font-size:13px">' + m.content + '</div>' +
              '<p style="font-size:10px;color:#8b7266;margin-top:2px">' + time + ' · ' + date + '</p></div>';
          }
        }).join('');
        container.scrollTop = container.scrollHeight;
      } catch(e) {
        container.innerHTML = '<div style="text-align:center;padding:20px;color:#8b7266;font-size:13px">Chưa có tin nhắn</div>';
      }
    }

    async function sendChatMsg(ticketId) {
      var input = document.getElementById('chat-input');
      var content = input.value.trim();
      if (!content) return;
      input.value = '';
      try {
        await apiFetch('/api/support/tickets/' + ticketId + '/messages', {
          method: 'POST', body: { content: content }
        });
        loadTicketMessages(ticketId);
      } catch(e) { showToastMsg('❌ ' + e.message); }
    }
    </script>
</body>
