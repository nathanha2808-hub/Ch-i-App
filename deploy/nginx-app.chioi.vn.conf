server {
    server_name app.chioi.vn;
    root /var/www/app.chioi.vn;
    index khachhang/dangnhap.html;
    charset utf-8;
    client_max_body_size 50M;
    gzip on; gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=(self)" always;

    location /api/ {
        proxy_pass http://127.0.0.1:3033; proxy_http_version 1.1;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3033; proxy_http_version 1.1;
        proxy_set_header Host $host; proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade"; proxy_read_timeout 86400;
    }
    location ~ ^/\.well-known/ { default_type application/json; allow all; }
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ { expires 30d; add_header Cache-Control "public, immutable"; access_log off; }
    location ~* \.(css|js)$ { expires 7d; add_header Cache-Control "public"; }
    location = /manifest.json { add_header Cache-Control "no-cache"; add_header Content-Type "application/manifest+json"; }
    location = /sw.js { add_header Cache-Control "no-cache, max-age=0"; add_header Service-Worker-Allowed "/"; }

    location = / { return 301 /khachhang/dangnhap.html; }
    location / { try_files $uri $uri/ =404; }
    location /khachhang/ { try_files $uri $uri/ =404; }
    location /giupviec/  { try_files $uri $uri/ =404; }
    location /admin/     { try_files $uri $uri/ =404; }
    location /support/ { index index.html; try_files $uri $uri/index.html =404; }
    location /shared/    { try_files $uri $uri/ =404; }
    location /icons/     { try_files $uri =404; expires 30d; }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chioi.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chioi.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = app.chioi.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name app.chioi.vn;
    return 404; # managed by Certbot


}