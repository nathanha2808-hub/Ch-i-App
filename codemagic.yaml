# =============================================================================
# Codemagic CI/CD config cho Chị Ơi! iOS
# 3 workflows:
#   1. ios-verify         — Build .app simulator (no signing). Chạy ngay sau khi
#                            connect repo. KHÔNG cần Apple Developer.
#   2. ios-debug-ipa      — Build debug-signed IPA (dùng auto-managed signing
#                            của Codemagic). Cần Apple Dev + integration.
#   3. ios-release-store  — Build release IPA + auto upload TestFlight + dSYM.
#                            Cần Apple Dev + integration + tag v*.
# =============================================================================

definitions:
  cache: &cache_cfg
    cache_paths:
      - mobile-ios/node_modules
      - $HOME/Library/Caches/CocoaPods
      - $HOME/.gradle/caches
      - $HOME/Library/Developer/Xcode/DerivedData

workflows:

  # ===========================================================================
  # Workflow 1: ios-verify — Build kiểm tra (KHÔNG cần Apple Dev)
  # ===========================================================================
  # Chạy ngay khi user kết nối repo lên Codemagic.
  # Mỗi push lên branch main hoặc feature/* trigger workflow này.
  # Build .app cho simulator (no signing) → verify project compile OK.
  # ===========================================================================
  ios-verify:
    name: iOS Verify Build (no signing)
    instance_type: mac_mini_m2
    max_build_duration: 30
    cache: *cache_cfg

    environment:
      vars:
        XCODE_WORKSPACE: "mobile-ios/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20.20.2
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'feature/**'
          include: true
        - pattern: 'fix/**'
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install Capacitor deps
        script: |
          cd mobile-ios
          npm ci --no-audit --no-fund --prefer-offline

      - name: Generate app icon (optional — đã có sẵn trong repo)
        script: |
          cd mobile-ios
          if [ ! -f ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png ]; then
            npm install --no-save sharp
            node generate-icons.js || echo "Icon already exists or sharp not available"
          fi

      - name: Capacitor sync iOS
        script: |
          cd mobile-ios
          npx cap sync ios

      - name: CocoaPods install
        script: |
          cd mobile-ios/ios/App
          pod install --repo-update

      - name: Build .app for simulator (no signing)
        script: |
          cd mobile-ios
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

    artifacts:
      - mobile-ios/build/Build/Products/Debug-iphonesimulator/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - nathanha.2808@gmail.com
        notify:
          success: true
          failure: true

  # ===========================================================================
  # Workflow 2: ios-debug-ipa — Build debug-signed IPA (TestFlight Internal)
  # ===========================================================================
  # YÊU CẦU:
  #   - Apple Developer Program active ($99/năm)
  #   - App ID `vn.chioi.app` đã tạo
  #   - Integration `chioi-app-store-key` đã setup trong Codemagic Teams
  # Trigger: manual hoặc tag v*-debug
  # ===========================================================================
  ios-debug-ipa:
    name: iOS Debug IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    cache: *cache_cfg

    environment:
      vars:
        BUNDLE_ID: "vn.chioi.app"
        XCODE_WORKSPACE: "mobile-ios/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20.20.2
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: chioi-app-store-key   # ⚠️ Tên integration setup trong Codemagic

    # Đã tắt trigger tự động bằng tag để tránh lỗi, bạn có thể bấm tay từ main
    # triggering:
    #   events:
    #     - tag
    #   tag_patterns:
    #     - pattern: 'v*-debug'
    #       include: true

    scripts:
      - name: Setup keychain + signing (force create cert if missing)
        script: |
          set -e
          echo "===== iOS Signing Setup (Development) ====="
          echo "Bundle ID: $BUNDLE_ID"
          keychain initialize

          # Cùng pattern với ios-release-store: sinh private key trước, rồi
          # pass vào lệnh certificates create (CLI không tự gen key).
          CERT_KEY_PATH=/tmp/development_cert_key.pem
          echo "----- Generating RSA 2048 private key -----"
          openssl genrsa -out "$CERT_KEY_PATH" 2048

          echo "----- Creating Development certificate với key vừa sinh -----"
          app-store-connect certificates create \
            --type IOS_DEVELOPMENT \
            --certificate-key=@file:"$CERT_KEY_PATH" \
            --save \
            --verbose

          echo "----- Fetching/creating profile cho bundle ID -----"
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --certificate-key=@file:"$CERT_KEY_PATH" \
            --create \
            --verbose

          keychain add-certificates
          xcode-project use-profiles

          echo "===== Signing setup done ====="
          echo "Certs trong keychain:"
          security find-identity -v -p codesigning $HOME/Library/Keychains/login.keychain-db || true

      - name: Install deps + sync
        script: |
          cd mobile-ios
          npm ci --no-audit --no-fund --prefer-offline
          npx cap sync ios
          cd ios/App && pod install --repo-update

      - name: Bump build number and Version
        script: |
          cd mobile-ios/ios/App
          agvtool new-version -all $((BUILD_NUMBER + 50))
          # Tự động cập nhật phiên bản theo số vòng lặp của Codemagic
          agvtool new-marketing-version "1.0.$BUILD_NUMBER"

      - name: Build .ipa (debug-signed)
        script: |
          cd mobile-ios
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Debug

    # IPA thực tế export ở `mobile-ios/build/ios/ipa/App.ipa` (không phải
    # `mobile-ios/ios/App/build/...`). Path trước đó sai khiến artifacts
    # không gom IPA → publishing skip "no IPAs or PKGs found".
    artifacts:
      - mobile-ios/build/ios/ipa/*.ipa
      - mobile-ios/build/ios/xcarchive/**/dSYMs/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - nathanha.2808@gmail.com
        notify:
          success: true
          failure: true

  # ===========================================================================
  # Workflow 3: ios-release-store — Production release → TestFlight
  # ===========================================================================
  # YÊU CẦU đầy đủ:
  #   - Apple Developer Program active
  #   - App ID + Distribution certificate + Provisioning profile
  #   - App đã tạo trong App Store Connect (note Apple ID number 10-digit)
  #   - Integration setup trong Codemagic
  # Trigger: Đã tắt trigger tag tự động, giờ chạy hoàn toàn bằng nút bấm thủ công từ nhánh main
  # Auto upload TestFlight (Internal Testers group). KHÔNG auto submit Production.
  # ===========================================================================
  ios-release-store:
    name: iOS Release → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    cache: *cache_cfg

    environment:
      vars:
        BUNDLE_ID: "vn.chioi.app"
        XCODE_WORKSPACE: "mobile-ios/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6769330882"   # App Store Connect → Chị Ơi! → App Info
      node: 20.20.2
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: chioi-app-store-key

    # Đã tắt Trigger Tag cũ để bạn thoải mái build từ nhánh main
    # triggering:
    #   events:
    #     - tag
    #   tag_patterns:
    #     - pattern: 'v[0-9]+.[0-9]+.[0-9]+'   # vd v1.0.0, v1.0.1
    #       include: true

    scripts:
      - name: Setup keychain + production signing (auto-revoke stale certs)
        script: |
          set -e
          echo "===== iOS Signing Setup (App Store) ====="
          echo "Bundle ID: $BUNDLE_ID"
          echo "App Store Apple ID: $APP_STORE_APPLE_ID"
          keychain initialize

          # ============================================================
          # FIX BUILD v1.0.38 turn 2: "Cannot save Signing Certificates
          # without certificate private key"
          #
          # ROOT CAUSE:
          #   Apple Dev có 2 stale IOS_DISTRIBUTION certs (từ build trước)
          #   Codemagic ko có private key match → fetch-signing-files fail
          #   "Cannot save Signing Certificates without certificate private key"
          #
          # APPROACH:
          #   1. List all existing IOS_DISTRIBUTION certs
          #   2. REVOKE tất cả cert cũ (Codemagic ko xài được nữa)
          #   3. Generate fresh RSA key + create cert mới
          #   4. fetch-signing-files với key vừa gen → match → success
          #
          # SAFE: app chưa có Production trên App Store → revoke cert ko ảnh
          # hưởng users. Nếu sau này có Production → bỏ auto-revoke step này.
          # ============================================================

          CERT_KEY_PATH=/tmp/distribution_cert_key.pem
          echo "----- Step 1: Listing existing Distribution certs -----"
          app-store-connect certificates list --type IOS_DISTRIBUTION --json > /tmp/certs.json 2>/dev/null || echo "[]" > /tmp/certs.json
          cat /tmp/certs.json | python3 -m json.tool 2>/dev/null | head -30 || cat /tmp/certs.json | head -30

          EXISTING_IDS=$(cat /tmp/certs.json | python3 -c "import sys, json; data=json.load(sys.stdin); [print(c['id']) for c in data if isinstance(c, dict) and c.get('id')]" 2>/dev/null || echo "")

          if [ -n "$EXISTING_IDS" ]; then
            echo "----- Step 2: Revoking stale certs (Codemagic ko có private key match) -----"
            for cert_id in $EXISTING_IDS; do
              echo "Revoking cert ID: $cert_id"
              app-store-connect certificates delete "$cert_id" --yes 2>&1 || echo "(revoke skip — đã expired hoặc revoked)"
            done
            sleep 5  # Đợi Apple sync state
          else
            echo "----- Step 2 skip: không có cert nào để revoke -----"
          fi

          echo "----- Step 3: Generate fresh RSA 2048 private key -----"
          openssl genrsa -out "$CERT_KEY_PATH" 2048
          ls -l "$CERT_KEY_PATH"

          echo "----- Step 4: Create new IOS_DISTRIBUTION cert với key mới -----"
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:"$CERT_KEY_PATH" \
            --save \
            --verbose

          echo "----- Step 5: Fetch signing files (cert + profile) -----"
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$CERT_KEY_PATH" \
            --create \
            --verbose

          keychain add-certificates
          xcode-project use-profiles

          echo "===== Signing setup done ====="
          echo "Certs trong keychain:"
          security find-identity -v -p codesigning $HOME/Library/Keychains/login.keychain-db || true

      - name: Install Capacitor deps
        script: |
          cd mobile-ios
          npm ci --no-audit --no-fund --prefer-offline

      - name: Capacitor sync iOS
        script: |
          cd mobile-ios
          npx cap sync ios

      - name: CocoaPods install
        script: |
          cd mobile-ios/ios/App
          pod install --repo-update

      - name: Bump build number and Marketing Version (Auto)
        script: |
          set -e
          cd mobile-ios/ios/App
          # Dùng BUILD_NUMBER nội bộ của Codemagic (auto-increment mỗi build)
          # + offset 100 để safely vượt qua mọi version Apple đã có
          # (build #18 + #19 đã upload version 1 → reject duplicate).
          # Build #20 sẽ là version 120, #21 là 121... không bao giờ trùng.
          #
          # Cách cũ dùng `app-store-connect get-latest-app-store-build-number`
          # KHÔNG hoạt động — query về empty hoặc output thừa whitespace làm
          # $(()) math fail, agvtool giữ nguyên version=1 → upload reject.
          
          # 1. TĂNG BUILD NUMBER NHƯ CŨ
          NEW_VERSION=$(($BUILD_NUMBER + 100))
          echo "===== Bump CFBundleVersion to $NEW_VERSION ====="
          echo "Codemagic BUILD_NUMBER: $BUILD_NUMBER"
          agvtool new-version -all "$NEW_VERSION"
          
          # 2. TỰ ĐỘNG CẬP NHẬT PHIÊN BẢN CÔNG KHAI (KHÔNG DÙNG TAG)
          # App sẽ tự động tăng tiến thành 1.0.34, 1.0.35, 1.0.36... theo số lần bấm build
          NEW_MKT_VERSION="1.0.$BUILD_NUMBER"
          echo "===== Cập nhật Marketing Version tự động thành $NEW_MKT_VERSION ====="
          agvtool new-marketing-version "$NEW_MKT_VERSION"
          
          echo "Verify after bump:"
          agvtool what-version
          agvtool what-marketing-version

      - name: Build Release IPA + dSYM
        script: |
          cd mobile-ios
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    # IPA xuất ở `mobile-ios/build/ios/ipa/App.ipa` (xác nhận từ build log
    # "Successfully exported ipa to build/ios/ipa/App.ipa"). dSYMs nằm trong
    # xcarchive. Path trước đó sai → publishing skip "no IPAs or PKGs found"
    # → TestFlight không nhận build mặc dù IPA đã build OK.
    artifacts:
      - mobile-ios/build/ios/ipa/*.ipa
      - mobile-ios/build/ios/xcarchive/**/dSYMs/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true      # Upload IPA → TestFlight Processing
        # beta_groups: TẠM TẮT — Apple API tra cứu group name case-sensitive,
        # mismatch nhỏ (Phòng vs phòng, Nam vs NAM, trailing space) cũng fail.
        # User manual add build vào group trong App Store Connect UI:
        #   ASC → app → TestFlight → Internal Testing → group → click +Build
        # beta_groups:
        #   - "Test Phòng Nam"
        submit_to_app_store: false      # Manual review submission

      email:
        recipients:
          - nathanha.2808@gmail.com
        notify:
          success: true
          failure: true