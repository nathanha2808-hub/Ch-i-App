<script>
(function() {
  // ===== 1. Kiểm tra đăng nhập =====
  if (!ChiOiAuth.requireAuth('dangnhaptasker.html')) return;

  var user = ChiOiAuth.getUser();
  var currentOrder = null; // Đơn hàng hiện tại đang hiển thị trên modal
  var countdownTimer = null;

  // Bug 3 FIX (report14): Danh sách đơn đã bỏ qua — lưu vào localStorage
  var skippedOrders = JSON.parse(localStorage.getItem('chioi_skipped_orders') || '[]');

  // TC-T07-009 FIX: BroadcastChannel sync đơn bỏ qua giữa các tab cùng browser
  var _skipChannel = null;
  try { _skipChannel = new BroadcastChannel('chioi_tasker_sync'); } catch(e) {}
  if (_skipChannel) {
    _skipChannel.onmessage = function(evt) {
      if (evt.data && evt.data.type === 'skip_order') {
        var oid = evt.data.orderId;
        if (skippedOrders.indexOf(oid) === -1) {
          skippedOrders.push(oid);
          localStorage.setItem('chioi_skipped_orders', JSON.stringify(skippedOrders));
        }
        // Nếu đang hiển thị đúng đơn này → ẩn đi
        if (currentOrder && currentOrder.order_id === oid) {
          hideModal();
          showToast('📢 Đơn #' + oid + ' đã bị bỏ qua từ thiết bị khác');
          showIdleState();
          currentOrder = null;
        }
      }
    };
  }

  // ===== 2. Hiển thị tên user lên Header =====
  if (user && user.full_name) {
    var nameEl = document.querySelector('header h1');
    if (nameEl) nameEl.textContent = user.full_name + ' 👋';

    var greetEl = document.querySelector('header span.text-white\\/90');
    if (greetEl) {
      var hour = new Date().getHours();
      if (hour < 12) greetEl.textContent = 'Chào buổi sáng,';
      else if (hour < 18) greetEl.textContent = 'Chào buổi chiều,';
      else greetEl.textContent = 'Chào buổi tối,';
    }
  }

  // ===== 3. Online/Offline Toggle =====
  var toggleInput = document.querySelector('header input[type="checkbox"]');
  if (toggleInput) {
    // Khôi phục trạng thái từ localStorage (nếu có), mặc định tắt nếu chưa từng bật
    var storageKey = 'chioi_tasker_online_' + (user ? user.user_id : 'unknown');
    var savedStatus = localStorage.getItem(storageKey);
    var isOnline = (savedStatus === 'true');
    toggleInput.checked = isOnline;
    
    // Gửi status khôi phục lên server khi mở app
    apiFetch('/api/taskers/status', {
      method: 'PATCH',
      body: { is_online: isOnline }
    }).catch(function(err) {
      console.warn('Lỗi đồng bộ trạng thái online:', err);
    });

    if (isOnline) {
      startGpsTracking();
    }

    toggleInput.addEventListener('change', function(e) {
      if (toggleInput.checked) {
        // Enforce GPS check before allowing ONLINE
        if (navigator.geolocation) {
          showToast('Đang lấy vị trí GPS...');
          navigator.geolocation.getCurrentPosition(async function(pos) {
            // Success: Turn on Online
            try {
              await apiFetch('/api/taskers/status', {
                method: 'PATCH',
                body: { is_online: true }
              });
              localStorage.setItem(storageKey, 'true');
              showToast('🟢 Đã bật nhận việc');
              if (window.ChiOiSocket) {
                window.ChiOiSocket.emit('update_status', { is_online: true });
              }
              startGpsTracking();
              updateLocationAndSendGps();
              
              var idleText = document.querySelector('#idle-state .font-bold');
              var idleSubText = document.querySelector('#idle-state .text-xs');
              if (idleText) idleText.textContent = 'Đang tìm đơn hàng...';
              if (idleSubText) idleSubText.textContent = 'Bạn đang ở chế độ trực tuyến';
            } catch (err) {
              showToast('Lỗi: ' + err.message);
              toggleInput.checked = false; // revert
            }
          }, function(err) {
            // Error/Denied
            showToast('❌ Bạn phải cho phép truy cập Vị trí (GPS) để bật nhận việc!');
            toggleInput.checked = false; // revert
          }, { enableHighAccuracy: true, timeout: 10000 });
        } else {
          showToast('❌ Thiết bị của bạn không hỗ trợ GPS!');
          toggleInput.checked = false;
        }
      } else {
        // Bật OFF
        apiFetch('/api/taskers/status', {
          method: 'PATCH',
          body: { is_online: false }
        }).then(function() {
          localStorage.setItem(storageKey, 'false');
          showToast('🔴 Đã tắt nhận việc');
          if (window.ChiOiSocket) {
            window.ChiOiSocket.emit('update_status', { is_online: false });
          }
          stopGpsTracking();
          
          if (!isHandlingOrder) {
            clearInterval(countdownTimer);
            hideModal();
            showIdleState();
            var idleText = document.querySelector('#idle-state .font-bold');
            var idleSubText = document.querySelector('#idle-state .text-xs');
            if (idleText) idleText.textContent = 'Đang tắt nhận việc';
            if (idleSubText) idleSubText.textContent = 'Bật lại để nhận đơn hàng mới';
            currentOrder = null;
          }
        }).catch(function(err) {
          showToast('Lỗi: ' + err.message);
          toggleInput.checked = true; // revert
        });
      }
    });

    // TC_T04_012 FIX: Lắng nghe sync trạng thái từ thiết bị khác
    if (window.ChiOiSocket) {
      window.ChiOiSocket.on('status_synced', function(data) {
        if (toggleInput && typeof data.is_online === 'boolean') {
          toggleInput.checked = data.is_online;
          localStorage.setItem('chioi_tasker_online', String(data.is_online));
          showToast(data.is_online ? '📡 Thiết bị khác đã bật nhận việc' : '📡 Thiết bị khác đã tắt nhận việc');
          // Update UI text
          var idleText = document.querySelector('#idle-state .font-bold');
          var idleSubText = document.querySelector('#idle-state .text-xs');
          if (data.is_online) {
            if (idleText) idleText.textContent = 'Đang tìm đơn hàng...';
            if (idleSubText) idleSubText.textContent = 'Bạn đang ở chế độ trực tuyến';
            startGpsTracking();
          } else {
            if (idleText) idleText.textContent = 'Đang tắt nhận việc';
            if (idleSubText) idleSubText.textContent = 'Bật lại để nhận đơn hàng mới';
            stopGpsTracking();
          }
        }
      });
    }
  }

  // ===== 4. Ẩn modal đơn mới ban đầu, hiện trạng thái Idle =====
  var modal = document.getElementById('modal-don-moi');
  if (modal) {
    modal.style.display = 'none';
    modal.style.opacity = '1';
    modal.style.transform = 'scale(1)';
  }
  showIdleState();

  // ===== Tự động nhận đơn (Auto-Accept) =====
  var autoAcceptInput = document.getElementById('auto-accept-toggle');
  window.isAutoAcceptEnabled = false; // Dùng global để các hàm khác gọi được dễ dàng
  if (autoAcceptInput) {
    var savedAutoAccept = localStorage.getItem('chioi_auto_accept_' + (user ? user.user_id : 'unknown'));
    window.isAutoAcceptEnabled = (savedAutoAccept === 'true');
    autoAcceptInput.checked = window.isAutoAcceptEnabled;

    autoAcceptInput.addEventListener('change', function() {
      var toggleInput = document.querySelector('header input[type="checkbox"]');
      if (autoAcceptInput.checked && toggleInput && !toggleInput.checked) {
        showToast('⚠️ Vui lòng bật Nhận Việc trước khi bật Tự động nhận đơn!');
        autoAcceptInput.checked = false;
        return;
      }

      window.isAutoAcceptEnabled = autoAcceptInput.checked;
      localStorage.setItem('chioi_auto_accept_' + (user ? user.user_id : 'unknown'), String(window.isAutoAcceptEnabled));
      if (window.isAutoAcceptEnabled) {
        showToast('⚡ Đã bật Tự động nhận đơn');
      } else {
        showToast('🔴 Đã tắt Tự động nhận đơn');
      }
    });
  }

  // ===== 5. Khởi tạo Leaflet Map =====
  var defaultLat = 10.7769; // Fallback nếu GPS không có
  var defaultLng = 106.7009;
  var map = L.map('leaflet-map', { zoomControl: false, attributionControl: false }).setView([defaultLat, defaultLng], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // Custom icon cho Tasker
  var taskerIcon = L.divIcon({
    className: '',
    html: '<div class="tasker-marker"><div class="pulse-ring"></div></div>',
    iconSize: [40, 40],
    iconAnchor: [20, 20]
  });
  var taskerMarker = L.marker([defaultLat, defaultLng], { icon: taskerIcon }).addTo(map);
  // Không bindPopup — Bug 5: bỏ popup "Vị trí của bạn"

  // ===== 6. Kết nối Socket Realtime =====
  var socket = connectSocket();
  var gpsWatchId = null; // Bug 1: GPS realtime watch ID

  // Hàm lấy vị trí và gửi GPS — Bug 1: Chỉ gửi GPS khi ONLINE
  function updateLocationAndSendGps() {
    // Bug 1: Không gửi GPS nếu đang offline
    var toggleCheck = document.querySelector('header input[type="checkbox"]');
    if (toggleCheck && !toggleCheck.checked) return;

    function emitGps(lat, lng) {
      if (socket && socket.connected) {
        socket.emit('update_gps', { latitude: lat, longitude: lng });
      } else if (socket) {
        socket.on('connect', function() {
          socket.emit('update_gps', { latitude: lat, longitude: lng });
        });
      }
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        map.setView([lat, lng], 16);
        taskerMarker.setLatLng([lat, lng]);
        emitGps(lat, lng);
      }, function() {
        console.warn('[Map] Không lấy được vị trí thực, từ chối gửi GPS ảo.');
        showToast('❌ Mất kết nối GPS, vui lòng kiểm tra lại quyền Vị trí!');
      }, { enableHighAccuracy: true, timeout: 10000 });
    } else {
      showToast('❌ Thiết bị không hỗ trợ GPS!');
    }
  }

  // Bug 1: Bật GPS realtime watchPosition khi online
  function startGpsTracking() {
    if (gpsWatchId !== null) return; // Đã bật rồi
    if (navigator.geolocation) {
      gpsWatchId = navigator.geolocation.watchPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        map.setView([lat, lng], 16);
        taskerMarker.setLatLng([lat, lng]);
        if (socket && socket.connected) {
          socket.emit('update_gps', { latitude: lat, longitude: lng });
        }
      }, function() {
        console.warn('[Map] GPS watch error');
      }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 });
    }
  }

  function stopGpsTracking() {
    if (gpsWatchId !== null && navigator.geolocation) {
      navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId = null;
    }
  }

  // Bug 1: Lấy vị trí hiện tại để hiện map nhưng KHÔNG gửi GPS (vì mặc định OFF)
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      map.setView([pos.coords.latitude, pos.coords.longitude], 16);
      taskerMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
    }, function() {}, { enableHighAccuracy: true, timeout: 10000 });
  }

  if (socket) {
    // Nhận đơn hàng mới
    socket.on('new_order', function(data) {
      // Nếu đang offline → không hiện đơn mới
      var toggleInput = document.querySelector('header input[type="checkbox"]');
      if (toggleInput && !toggleInput.checked) return;
      // Nếu đơn đã bỏ qua → bỏ qua luôn
      if (skippedOrders.indexOf(data.order.order_id) > -1) return;
      // Nếu đang có đơn → không hiện đơn mới
      if (isHandlingOrder) return;

      // Auto-Accept
      if (window.isAutoAcceptEnabled) {
        window.autoAcceptOrder(data.order);
        return;
      }

      currentOrder = data.order;
      // TC_T05_013 FIX: Phát âm thanh thông báo đơn mới
      playNotificationSound();
      showNewOrderModal(data.order);
    });

    // Bug 1: Gửi GPS mỗi 30 giây CHỈ KHI ONLINE
    setInterval(function() {
      var toggleCheck = document.querySelector('header input[type="checkbox"]');
      if (toggleCheck && toggleCheck.checked) updateLocationAndSendGps();
    }, 30000);

    // Nhận tin nhắn
    socket.on('receive_message', function(msg) {
      showToast('💬 Tin nhắn mới từ khách hàng');
    });

    // Đơn bị hủy
    socket.on('order_cancelled', function(data) {
      showToast('⚠️ ' + data.message);
      if (currentOrder && currentOrder.order_id === data.orderId) {
        hideModal();
        showIdleState();
        currentOrder = null;
      }
    });

    // TC-T09-013 FIX: KH xác nhận hoàn thành đơn → reset UI
    socket.on('order_confirmed', function(data) {
      showToast('🎉 ' + (data.message || 'Đơn đã được xác nhận hoàn thành!'));
      addNotification('complete', 'Đơn ' + (data.orderCode || data.orderId) + ' đã hoàn thành!', data);
      isHandlingOrder = false;
      hideModal();
      showIdleState();
      currentOrder = null;
    });

    socket.on('force_logout', function(data) {
      alert(data.reason || 'Tài khoản của bạn đã bị khóa. Phiên làm việc đã kết thúc.');
      ChiOiAuth.logout();
    });
  }

  // ===== 10. Bug 8 FIX: Kiểm tra đơn đang thực hiện trước khi hiện đơn mới =====
  var isHandlingOrder = false; // Flag: đang xử lý đơn
  var isFirstLoad = true;      // Flag: Kiểm tra lịch sử lần đầu tiên

  // FIX: fixTimezone ở IIFE top-level scope để showNewOrderModal + showActiveOrderCard đều dùng được
  function fixTimezone(isoStr) {
    if (!isoStr) return isoStr;
    return String(isoStr).replace(/Z$/i, '').replace(/\+00:00$/, '');
  }

  // Hàm check đơn hàng — reusable cho cả init lần đầu và polling
  async function checkAvailableOrders() {
    // Nếu đang xử lý đơn → không hiện đơn mới
    if (isHandlingOrder) return;

    // Chỉ gọi lịch sử 1 lần lúc mới tải trang hoặc khi thật sự cần
    if (isFirstLoad) {
      try {
        // Check đơn hàng đang thực hiện (ACCEPTED / IN_PROGRESS / TASKER_ARRIVED)
        var history = await apiFetch('/api/taskers/history');
        if (history && history.length > 0) {
          var activeOrder = history.find(function(o) {
            return ['ACCEPTED', 'TASKER_ARRIVED', 'IN_PROGRESS'].indexOf(o.status) > -1;
          });
          if (activeOrder) {
            isHandlingOrder = true;
            showActiveOrderCard(activeOrder);
            isFirstLoad = false;
            return;
          }
          // FIX: Bỏ chặn đơn có status 'COMPLETED' vì Tasker đã rảnh
          var pendingOrder = history.find(function(o) {
            return o.status === 'PENDING_COMPLETION';
          });
          if (pendingOrder) {
            isFirstLoad = false;
            return;
          }
        }
      } catch (e) {
        console.warn('[Tasker] Không check được đơn đang xử lý:', e.message);
      }
      isFirstLoad = false;
    }

    // Nếu đang offline → không load đơn mới
    var toggleCheck = document.querySelector('header input[type="checkbox"]');
    if (toggleCheck && !toggleCheck.checked) return;

    // Nếu đang có đơn hiện trên modal → không ghi đè
    if (currentOrder) return;

    // Load đơn pending mới
    try {
      var orders = await apiFetch('/api/taskers/available-orders');
      if (orders && orders.length > 0) {
        // Lọc bỏ đơn đã skip
        var filtered = orders.filter(function(o) { return skippedOrders.indexOf(o.order_id) === -1; });
        if (filtered.length > 0) {
          if (window.isAutoAcceptEnabled) {
            window.autoAcceptOrder(filtered[0]);
          } else {
            currentOrder = filtered[0];
            playNotificationSound();
            showNewOrderModal(filtered[0]);
          }
        }
      }
    } catch (e) {
      console.warn('[Tasker] Không load được đơn hàng có sẵn:', e.message);
    }
  }

  // Chạy lần đầu khi mở trang
  checkAvailableOrders();

  // ===== REALTIME POLLING: Check đơn mới mỗi 3 giây khi đang online =====
  setInterval(function() {
    var toggleCheck = document.querySelector('header input[type="checkbox"]');
    if (toggleCheck && toggleCheck.checked && !isHandlingOrder && !currentOrder) {
      checkAvailableOrders();
    }
  }, 3000);

    var serviceName = (order.services && order.services.name) ? order.services.name : 'Dịch vụ';

    // TC-T08-005 FIX: fixTimezone đã chuyển lên global scope (dòng trên)

    var scheduledTime = order.scheduled_time ? formatDateTime(fixTimezone(order.scheduled_time)) : 'Chưa xác định';

    var startTimeFormatted = '';
    if (order.scheduled_time) {

    if (modal) {
      modal.innerHTML = '<div class="bg-white rounded-3xl overflow-hidden shadow-2xl border border-gray-100">' +

        '<div class="p-5 flex flex-col gap-3">' +

        '<div class="flex gap-3"><span class="material-symbols-outlined text-[#ff7e36]" style="font-variation-settings: \'FILL\' 1;">location_on</span>' +
        '<p class="text-sm text-gray-600">' + (order.address || 'Chưa cập nhật') + '</p></div>' +
        '<div class="flex gap-3"><span class="material-symbols-outlined text-[#ff7e36]" style="font-variation-settings: \'FILL\' 1;">cleaning_services</span>' +
        '<p class="font-bold text-gray-800">' + serviceName + '</p></div>' +
        '<div class="flex gap-3"><span class="material-symbols-outlined text-[#ff7e36]" style="font-variation-settings: \'FILL\' 1;">schedule</span>' +
        '<p class="text-sm text-gray-600">' + (startTimeFormatted ? startTimeFormatted + ' — ' : '') + scheduledTime + (durationText ? ' (' + durationText + ')' : '') + '</p></div>' +
        '<div class="mt-2 flex items-center justify-between border-t border-gray-100 pt-3">' +
        '<span class="text-xs font-bold text-gray-400 uppercase">Trạng thái</span>' +
        '<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold">' + (statusLabel[order.status] || order.status) + '</span></div>' +
        '<div class="flex items-center justify-between border-t border-gray-100 pt-3">' +
        '<span class="text-xs font-bold text-gray-400 uppercase">Thu nhập</span>' +
        '<span class="text-2xl font-bold text-[#a04100]">' + formatVND(order.total_price) + '</span></div>';

    // Tạo nút bấm cập nhật tiến độ
    var actionHtml = '';
    if (order.status === 'ACCEPTED') {
      actionHtml = '<button onclick="updateOrderStatus(' + order.order_id + ', \'TASKER_ARRIVED\')" class="w-full py-3 mt-3 rounded-full bg-[#00b1da] text-white font-bold shadow-lg hover:brightness-110 active:scale-95 transition-all">ĐÃ ĐẾN NƠI</button>';
    } else if (order.status === 'TASKER_ARRIVED') {
      var btnText = 'BẮT ĐẦU ' + serviceName.toUpperCase();
      if (serviceName.toLowerCase() === 'dọn nhà') btnText = 'BẮT ĐẦU DỌN DẸP';
      actionHtml = '<button onclick="updateOrderStatus(' + order.order_id + ', \'IN_PROGRESS\')" class="w-full py-3 mt-3 rounded-full bg-[#ff7e36] text-white font-bold shadow-lg hover:brightness-110 active:scale-95 transition-all">' + btnText + '</button>';
    } else if (order.status === 'IN_PROGRESS') {
      // FIX: Tasker bấm hoàn thành → Gửi COMPLETED trực tiếp
      actionHtml = '<button onclick="updateOrderStatus(' + order.order_id + ', \'COMPLETED\')" class="w-full py-3 mt-3 rounded-full bg-green-500 text-white font-bold shadow-lg hover:brightness-110 active:scale-95 transition-all">HOÀN THÀNH ĐƠN</button>';
    }

      // Nút Chat KH
      var chatHtml = '<a href="chatvoikhachhang.html?orderId=' + order.order_id + '&receiverId=' + order.customer_id + '" class="w-full py-3 mt-2 rounded-full border-2 border-[#00b1da] text-[#00b1da] font-bold flex items-center justify-center gap-2 active:scale-95 transition-all"><span class="material-symbols-outlined text-[18px]">chat</span>Chat với Khách hàng</a>';
      modal.innerHTML += actionHtml + chatHtml + '</div></div>';
      // Cập nhật header chat link
      var headerChat = document.getElementById('header-chat-link');
      if (headerChat) headerChat.href = 'chatvoikhachhang.html?orderId=' + order.order_id + '&receiverId=' + order.customer_id;
      modal.style.display = 'block';
      modal.style.opacity = '1';
      modal.style.transform = 'scale(1)';
    }
  }

  // Hàm cập nhật tiến độ đơn hàng
  window.updateOrderStatus = async function(orderId, newStatus) {
    try {
      showToast('Đang cập nhật...');
      var result = await apiFetch('/api/orders/' + orderId + '/status', {
        method: 'PATCH',
        body: { status: newStatus }
      });
      
      showToast('✅ Đã cập nhật thành công!');
      
      if (newStatus === 'COMPLETED') {
        showSuccessNotification('🎉 Đã hoàn thành đơn!', 'Tiền đã được cộng vào ví của bạn.');

        hideModal();
        showIdleState();
        currentOrder = null;
      } else {
        // Render lại card với trạng thái mới
        showActiveOrderCard(result);
      }
    } catch (err) {
      showToast('❌ ' + err.message);
    }
  };

  // TC_T05_004/007/008 FIX: Hiển thị đầy đủ thông tin đơn mới — REBUILD HTML hoàn toàn

  // ===== 7. Countdown Timer =====
  function startCountdown(seconds) {
    clearInterval(countdownTimer);
    var remaining = seconds;
    var countdownEl = document.getElementById('countdown');
    var progressBar = modal.querySelector('.bg-red-500');

    countdownTimer = setInterval(function() {
      remaining--;
      if (countdownEl) {
        var mins = Math.floor(remaining / 60);
        var secs = remaining % 60;
        countdownEl.textContent = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
      }
      if (progressBar) {
        progressBar.style.width = ((remaining / seconds) * 100) + '%';
      }
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        // Tự động bỏ qua
        boQuaDon();
      }
    }, 1000);
  }

    // ===== 8. Nhận đơn — Gọi API (Bug 8: block nếu đang có đơn) =====
  window.nhanDon = async function() {
    if (!currentOrder) return;
    if (isHandlingOrder) {
      showToast('⚠️ Bạn đang có đơn, hoàn thành trước khi nhận đơn mới!');
      return;
    }
    try {
      showToast('Đang nhận đơn...');
      var result = await apiFetch('/api/orders/' + currentOrder.order_id + '/accept', {
        method: 'PATCH'
      });
      clearInterval(countdownTimer);
      isHandlingOrder = true;
      // Lỗi 8 FIX: Hiển thị thông báo thành công rõ ràng với thời gian dài hơn
      showSuccessNotification('🎉 Nhận đơn thành công!', 'Bắt đầu di chuyển tới điểm dọn dẹp');
      // TC-T07-003 FIX: Thêm notification bell
      addNotification('accept', 'Đã nhận đơn ' + (currentOrder.order_code || currentOrder.order_id) + ' thành công!', currentOrder);
      // Bug 1 FIX (report13): Không gọi hideModal() vì nó có delay 300ms gây mất modal
      // Gọi thẳng showActiveOrderCard() — hàm này tự set display: block
      showActiveOrderCard(Object.assign({}, currentOrder, { status: 'ACCEPTED' }));
      currentOrder = null;
      // Rung thiết bị nếu hỗ trợ
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    } catch (err) {
      // TC-T06-005 FIX: Phân biệt lỗi race condition vs lỗi thường
      var msg = err.message || '';
      if (msg.indexOf('không còn khả dụng') !== -1 || msg.indexOf('đã được nhận') !== -1) {
        showToast('⚡ Đơn này đã được Tasker khác nhận trước. Chờ đơn mới nhé!');
        hideModal();
        showIdleState();
        currentOrder = null;
      } else {
        showToast('❌ ' + msg);
      }
    }
  };

  // ===== Tự động nhận đơn (chạy ngầm) =====
  window.autoAcceptOrder = async function(order) {
    if (isHandlingOrder) return;
    try {
      showToast('⚡ Đang tự động nhận đơn...');
      var result = await apiFetch('/api/orders/' + order.order_id + '/accept', {
        method: 'PATCH'
      });
      clearInterval(countdownTimer);
      isHandlingOrder = true;
      showSuccessNotification('⚡ Đã tự động nhận đơn!', 'Bắt đầu di chuyển tới điểm dọn dẹp');
      addNotification('accept', 'Đã tự động nhận đơn ' + (order.order_code || order.order_id) + '!', order);
      showActiveOrderCard(Object.assign({}, order, { status: 'ACCEPTED' }));
      playNotificationSound();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
    } catch (err) {
      // Bỏ qua im lặng nếu lỗi race condition
      var msg = err.message || '';
      if (msg.indexOf('không còn khả dụng') !== -1 || msg.indexOf('đã được nhận') !== -1) {
        console.log('Auto-accept failed (race condition):', msg);
      } else {
        showToast('❌ Lỗi tự nhận đơn: ' + msg);
      }
    }
  };

  // ===== 9. Bỏ qua đơn =====
  window.boQuaDon = function() {
    // TC-T07-005 FIX: Check trạng thái mạng trước khi bỏ qua đơn
    if (!navigator.onLine) {
      showToast('⚠️ Mất kết nối mạng! Đơn hàng sẽ được giữ lại cho đến khi có mạng.');
      return; // Giữ nguyên đơn trên UI, không bỏ qua
    }
    clearInterval(countdownTimer);
    // Lưu đơn đã bỏ qua vào localStorage
    if (currentOrder && currentOrder.order_id) {
      skippedOrders.push(currentOrder.order_id);
      if (skippedOrders.length > 100) skippedOrders = skippedOrders.slice(-100);
      localStorage.setItem('chioi_skipped_orders', JSON.stringify(skippedOrders));
      // TC-T07-009 FIX: Broadcast sang các tab khác
      if (_skipChannel) _skipChannel.postMessage({ type: 'skip_order', orderId: currentOrder.order_id });
      // TC-T07-003 FIX: Thêm vào notification bell
      addNotification('skip', 'Đã bỏ qua đơn ' + (currentOrder.order_code || currentOrder.order_id), currentOrder);
    }
    hideModal();
    showToast('❌ Đã từ chối nhận đơn hàng. Chú ý tỷ lệ nhận đơn!');
    showIdleState();
    currentOrder = null;
  };

})();

// ===== Utility functions (giữ nguyên cấu trúc cũ) =====
function hideModal() {
  var modal = document.getElementById('modal-don-moi');
  if (modal) {
    modal.style.opacity = '0';
    modal.style.transform = 'scale(0.95)';
    setTimeout(function() { modal.style.display = 'none'; }, 300);
  }
}

function showIdleState() {
  var idle = document.getElementById('idle-state');
  if (!idle) return; // FIX: prevent "Cannot read properties of null"
  
  var toggleInput = document.querySelector('header input[type="checkbox"]');
  var idleText = document.querySelector('#idle-state .font-bold');
  var idleSubText = document.querySelector('#idle-state .text-xs');
  
  if (toggleInput && idleText && idleSubText) {
    if (toggleInput.checked) {
      idleText.textContent = 'Đang tìm đơn hàng...';
      idleSubText.textContent = 'Bạn đang ở chế độ trực tuyến';
    } else {
      idleText.textContent = 'Đang tắt nhận việc';
      idleSubText.textContent = 'Bật lại để nhận đơn hàng mới';
    }
  }

  idle.classList.remove('hidden');
  setTimeout(function() {
    idle.classList.remove('translate-y-10', 'opacity-0');
  }, 50);
}

function showToast(msg) {
  var toast = document.getElementById('toast-notify');
  document.getElementById('toast-msg').innerText = msg;
  toast.classList.remove('hidden');
  setTimeout(function() { toast.classList.add('hidden'); }, 4000);
}

// Lỗi 8 FIX: Thông báo nhận đơn thành công nổi bật hơn
function showSuccessNotification(title, subtitle) {
  // Remove existing if any
  var existing = document.getElementById('success-notify-banner');
  if (existing) existing.remove();

  var banner = document.createElement('div');
  banner.id = 'success-notify-banner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;background:linear-gradient(135deg,#16a34a,#22c55e);color:white;text-align:center;animation:slideDown 0.3s ease-out;box-shadow:0 4px 20px rgba(0,0,0,0.2);';
  banner.innerHTML = '<p style="font-size:18px;font-weight:bold;margin:0;">' + title + '</p>' +
    (subtitle ? '<p style="font-size:14px;opacity:0.9;margin:4px 0 0;">' + subtitle + '</p>' : '');
  document.body.appendChild(banner);

  // Add animation
  var style = document.createElement('style');
  style.textContent = '@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}';
  document.head.appendChild(style);

  setTimeout(function() {
    banner.style.animation = 'slideDown 0.3s ease-out reverse';
    setTimeout(function() { banner.remove(); style.remove(); }, 300);
  }, 5000);
}

// TC_T05_013 FIX: Hàm phát âm thanh thông báo đơn mới
function playNotificationSound() {
  try {
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    var ctx = new AudioCtx();
    // Tạo âm thanh notification 2 tone
    var notes = [523.25, 659.25, 783.99]; // C5, E5, G5
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.3);
    });
    // Rung thiết bị nếu hỗ trợ
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
  } catch(e) {
    console.warn('[Sound] Không phát được âm thanh:', e);
  }
}

// ========================================
// TC-T07-003 FIX: Notification Bell System
// ========================================
var _notifStore = JSON.parse(localStorage.getItem('chioi_notifications') || '[]');

function addNotification(type, message, order) {
  var icon = type === 'accept' ? 'check_circle' : type === 'skip' ? 'cancel' : 'notifications';
  var color = type === 'accept' ? '#16a34a' : type === 'skip' ? '#ef4444' : '#ff7e36';
  var notif = {
    id: Date.now(),
    type: type,
    message: message,
    icon: icon,
    color: color,
    time: new Date().toISOString(),
    orderId: order ? order.order_id : null
  };
  _notifStore.unshift(notif);
  if (_notifStore.length > 50) _notifStore = _notifStore.slice(0, 50);
  localStorage.setItem('chioi_notifications', JSON.stringify(_notifStore));
  updateBellBadge();
  renderNotifList();
}

function updateBellBadge() {
  var badge = document.getElementById('bell-badge');
  if (!badge) return;
  var unreadCount = _notifStore.length;
  if (unreadCount > 0) {
    badge.classList.remove('hidden');
    badge.textContent = unreadCount > 9 ? '9+' : String(unreadCount);
  } else {
    badge.classList.add('hidden');
  }
}

function toggleNotifPanel() {
  var panel = document.getElementById('notif-panel');
  if (panel) {
    panel.classList.toggle('hidden');
    renderNotifList();
  }
}

function renderNotifList() {
  var list = document.getElementById('notif-list');
  if (!list) return;
  if (_notifStore.length === 0) {
    list.innerHTML = '<p class="text-center text-gray-400 text-sm py-6">Chưa có thông báo</p>';
    return;
  }
  list.innerHTML = '';
  _notifStore.forEach(function(n) {
    var timeAgo = getTimeAgo(n.time);
    var div = document.createElement('div');
    div.className = 'flex items-start gap-3 px-4 py-3 border-b border-gray-50 hover:bg-gray-50 transition-colors';
    div.innerHTML = '<span class="material-symbols-outlined text-[20px] mt-0.5" style="color:' + n.color + ';font-variation-settings: \'FILL\' 1;">' + n.icon + '</span>' +
      '<div class="flex-1"><p class="text-sm text-gray-800">' + n.message + '</p>' +
      '<p class="text-[11px] text-gray-400 mt-0.5">' + timeAgo + '</p></div>';
    list.appendChild(div);
  });
}

function clearNotifications() {
  _notifStore = [];
  localStorage.removeItem('chioi_notifications');
  updateBellBadge();
  renderNotifList();
}

function getTimeAgo(isoStr) {
  var diff = Date.now() - new Date(isoStr).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Vừa xong';
  if (mins < 60) return mins + ' phút trước';
  var hours = Math.floor(mins / 60);
  if (hours < 24) return hours + ' giờ trước';
  return Math.floor(hours / 24) + ' ngày trước';
}

// Init badge on load
updateBellBadge();

// Click outside to close notif panel
document.addEventListener('click', function(e) {
  var panel = document.getElementById('notif-panel');
  var bell = document.getElementById('header-bell');
  if (panel && !panel.classList.contains('hidden') && !panel.contains(e.target) && !bell.contains(e.target)) {
    panel.classList.add('hidden');
  }
});
